services:
  - type: web
    name: pr-reviewer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: ENABLE_GRAPH_ENRICHMENT
        value: "false"
      - key: GRAPH_QUERY_TIMEOUT
        value: "5"
      - key: MAX_IMPACT_WARNINGS
        value: "10"
      - key: GITHUB_ACCESS_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: DEFAULT_PROVIDER
        value: "cerebras"
      - key: DEFAULT_MODEL
        value: "meta-llama/Llama-3.1-8B-Instruct:cerebras"
      - key: HUGGING_FACE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: pr-reviewer-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: BACKEND_URL
        sync: false
